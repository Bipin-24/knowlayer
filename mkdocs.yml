site_name: Knowlayer Insights
site_url: https://bipin-24.github.io/knowlayer/docs/
site_description: Field notes on making content AI-ready — chunking, retrieval, metadata, and the KPIs that matter in the AI era.
site_author: Bipin Pandey

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - From Pageviews to AI-Readiness: ai-readiness.md
  - Chunking Deep-Dive: chunking.md

extra:
  homepage: https://bipin-24.github.io/knowlayer/
  social:
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/bipin-pandey24
    - icon: fontawesome/brands/github
      link: https://github.com/Bipin-24
  generator: false

copyright: >
  <a href="https://bipin-24.github.io/knowlayer/">← Back to Knowlayer</a>
