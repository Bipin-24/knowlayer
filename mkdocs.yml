site_name: Knowlayer Insights
site_url: https://bipin-24.github.io/knowlayer/docs/
site_description: Field notes on making content AI-ready — chunking, retrieval, metadata, and the KPIs that matter now that models are the primary readers of your docs.
site_author: Bipin Pandey

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight
  icon:
    logo: material/layers-triple
    repo: fontawesome/brands/github

repo_url: https://github.com/Bipin-24/knowlayer
repo_name: Bipin-24/knowlayer

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - AI-Readiness KPIs: ai-readiness.md
  - Chunking Deep-Dive: chunking.md
  - Knowledge Graphs: knowledge-graphs.md

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/bipin-pandey24
    - icon: fontawesome/brands/github
      link: https://github.com/Bipin-24
  generator: false

copyright: >
  <a href="../">← Back to Knowlayer</a> · The knowledge layer that humans and AI both depend on.